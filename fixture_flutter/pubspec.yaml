name: fixture_flutter
description: Calendario y fixture de la Copa Mundial de la FIFA 2026 en Flutter (iOS & Android).
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI e Iconos
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # Manejo de Estado y Utilidades
  provider: ^6.1.1
  intl: ^0.19.0
  timezone: ^0.9.4

  # Persistencia Local (Reemplazo de Room en Flutter)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notificaciones Locales (Alarmas de partidos)
  flutter_local_notifications: ^17.1.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/data/fixture_2026.json
    - assets/images/argentina_trophy_banner.png
    - assets/images/home_inicio_mockup.png
    - assets/images/fixture_mockup.png
